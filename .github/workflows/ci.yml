name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
          format: gcc
          severity: warning
          ignore_paths: zsh

  lua-syntax:
    name: Lua syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y lua5.4 -q
      - name: Check all .lua files
        run: find nvim -name "*.lua" -exec luac5.4 -p {} \; && echo "All Lua files OK"

  lua-format:
    name: Lua format (stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check nvim/

  validate-json:
    name: JSON validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate JSON files
        run: |
          for f in windows-terminal/settings.json; do
            echo "Checking $f..."
            jq empty "$f" && echo "  OK"
          done

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: .markdownlint.yaml
